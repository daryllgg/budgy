name: BudgyByDarskie
options:
  bundleIdPrefix: ""
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  BudgyByDarskie:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: BudgyByDarskie
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darskie.budgybydarskie
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: BudgyByDarskie/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: H6D5QC34HL
    dependencies:
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - target: BudgyWidgetExtension
    info:
      path: BudgyByDarskie/Info.plist
      properties:
        CFBundleDisplayName: Budgy
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.363219212047-e2kr2tso13rinjd3hrj9vunj0sufnqgd
              - budgy
        GIDClientID: 363219212047-e2kr2tso13rinjd3hrj9vunj0sufnqgd.apps.googleusercontent.com

  BudgyWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: BudgyWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.darskie.budgybydarskie.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: H6D5QC34HL
        INFOPLIST_FILE: BudgyWidget/Info.plist
    info:
      path: BudgyWidget/Info.plist
      properties:
        CFBundleDisplayName: Budgy Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
